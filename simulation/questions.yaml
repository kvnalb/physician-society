# Forward-looking survey (June 2022 information set). option_id must match LLM JSON output.
# Eval pseudo-labels use Part D (and related) fields AFTER 2022 — see eval/behavioral_labels.py.
questions:
  - question_id: f_q1_tirzepatide_12m
    text: >
      It is June 2022; tirzepatide (Mounjaro) is newly available for type 2 diabetes in the U.S.
      Looking ahead over the next 12 months, what do you expect your own Medicare Part D prescribing
      to look like for appropriate patients?
    options:
      - option_id: f_q1_expect_active
        label: I expect to use it actively for suitable patients
      - option_id: f_q1_expect_selective
        label: Selective / pilot use in a subset first
      - option_id: f_q1_expect_unlikely
        label: Unlikely I will prescribe in that window
      - option_id: f_q1_unsure
        label: Too uncertain (access, evidence, formulary)

  - question_id: f_q2_glp1_trajectory
    text: >
      Over the next program year (into 2023), how do you expect the share of your Medicare Part D
      type 2 diabetes patients on any GLP-1 agent to change?
    options:
      - option_id: f_q2_up
        label: Increase meaningfully
      - option_id: f_q2_flat
        label: Stay about the same
      - option_id: f_q2_down
        label: Decrease meaningfully

  - question_id: f_q3_branded_trajectory
    text: >
      Over the next program year (into 2023), how do you expect your branded share among Part D
      oral diabetes agents (where clinically relevant) to move?
    options:
      - option_id: f_q3_up
        label: Shift toward more branded use
      - option_id: f_q3_flat
        label: About the same mix
      - option_id: f_q3_down
        label: Shift toward more generic use

  - question_id: f_q4_diabetes_mix_trajectory
    text: >
      Looking into the next data year, how do you expect your diabetes-related share of Part D
      prescribing (for the patients you treat) to move?
    options:
      - option_id: f_q4_up
        label: Diabetes mix increases meaningfully
      - option_id: f_q4_flat
        label: About the same
      - option_id: f_q4_down
        label: Diabetes mix decreases meaningfully

  - question_id: f_q5_panel_scale_trajectory
    text: >
      Relative to your 2022 baseline, how do you expect your overall Medicare Part D prescribing
      activity (claim rows) to trend over the next year?
    options:
      - option_id: f_q5_up
        label: Meaningfully more Part D activity
      - option_id: f_q5_flat
        label: Roughly similar scale
      - option_id: f_q5_down
        label: Meaningfully less Part D activity

  - question_id: f_q6_molecule_breadth_trajectory
    text: >
      Over the next year, how do you expect the breadth of distinct diabetes-relevant molecules
      you touch in Part D to change?
    options:
      - option_id: f_q6_up
        label: Broader / more distinct molecules
      - option_id: f_q6_flat
        label: About the same breadth
      - option_id: f_q6_down
        label: Narrower / fewer distinct molecules
