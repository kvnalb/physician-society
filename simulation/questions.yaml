# Forward-looking survey (June 2022 information set). option_id must match LLM JSON output.
# Eval pseudo-labels use Part D (and related) fields AFTER 2022 — see eval/behavioral_labels.py.
questions:
  - question_id: f_q1_tirzepatide_12m
    text: >
      It is June 2022. Tirzepatide (Mounjaro) has been recently released by Eli Lilly & Co. as a new GLP-1 agonist for type 2 diabetes. How do you realistically expect to use it over the coming year or so?
    options:
      - option_id: f_q1_expect_active
        label: I expect to use it actively for suitable patients
      - option_id: f_q1_expect_selective
        label: Selective / pilot use in a subset first
      - option_id: f_q1_expect_unlikely
        label: Unlikely I will prescribe in that window
      - option_id: f_q1_unsure
        label: Too uncertain (access, evidence, formulary)

  - question_id: f_q2_glp1_trajectory
    text: >
      Do you expect the share of your Medicare Part D type 2 diabetes patients who are on some GLP‑1 therapy to climb, hold
      steady, or ease off over the coming months?
    options:
      - option_id: f_q2_up
        label: Increase meaningfully
      - option_id: f_q2_flat
        label: Stay about the same
      - option_id: f_q2_down
        label: Decrease meaningfully

  - question_id: f_q3_branded_trajectory
    text: >
      Among the oral diabetes agents you reach for when it’s clinically appropriate, how do you
      expect the **branded vs generic** mix on your Part D scripts to **shift** from here on?
    options:
      - option_id: f_q3_up
        label: Shift toward more branded use
      - option_id: f_q3_flat
        label: About the same mix
      - option_id: f_q3_down
        label: Shift toward more generic use

  - question_id: f_q4_diabetes_mix_trajectory
    text: >
      Thinking about your overall Part D panel: over the stretch ahead, do you expect diabetes-related
      prescribing to make up a larger slice, stay about the same share, or thin out relative
      to everything else you write?
    options:
      - option_id: f_q4_up
        label: Diabetes mix increases meaningfully
      - option_id: f_q4_flat
        label: About the same
      - option_id: f_q4_down
        label: Diabetes mix decreases meaningfully

  - question_id: f_q5_panel_scale_trajectory
    text: >
      Compared with what you’re doing now, how do you expect overall Medicare Part D
      prescribing activity to trend for you over the coming months?
    options:
      - option_id: f_q5_up
        label: Meaningfully more Part D activity
      - option_id: f_q5_flat
        label: Roughly similar scale
      - option_id: f_q5_down
        label: Meaningfully less Part D activity

  - question_id: f_q6_molecule_breadth_trajectory
    text: >
      When you think about **distinct diabetes-related molecules** you touch on Part D—not one drug,
      but the **breadth** of what you use—do you expect that footprint to **widen**, stay **about the
      same**, or **narrow** over the coming months?
    options:
      - option_id: f_q6_up
        label: Broader / more distinct molecules
      - option_id: f_q6_flat
        label: About the same breadth
      - option_id: f_q6_down
        label: Narrower / fewer distinct molecules
