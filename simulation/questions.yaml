# Single-select survey for prescriber personas. option_id must match LLM output line 1.
questions:
  - question_id: q1_second_line_agent
    text: >
      After metformin for type 2 diabetes, which class do you most often reach for as the
      typical next pharmacologic step for appropriate patients (June 2022, U.S. practice)?
    options:
      - option_id: q1_glp1
        label: GLP-1 receptor agonist (injectable or oral)
      - option_id: q1_sglt2
        label: SGLT2 inhibitor
      - option_id: q1_dpp4
        label: DPP-4 inhibitor
      - option_id: q1_su
        label: Sulfonylurea or meglitinide
      - option_id: q1_insulin
        label: Basal or other insulin (non-intensified)
      - option_id: q1_other
        label: Other / case-by-case / no dominant pattern

  - question_id: q2_glp1_panel_share
    text: >
      Roughly what share of your Medicare Part D type 2 diabetes panel is on any GLP-1
      agent (including semaglutide, dulaglutide, liraglutide, etc.) as of 2022?
    options:
      - option_id: q2_lt5
        label: Under 5%
      - option_id: q2_5_15
        label: 5% to under 15%
      - option_id: q2_15_30
        label: 15% to under 30%
      - option_id: q2_30_50
        label: 30% to under 50%
      - option_id: q2_50p
        label: 50% or more

  - question_id: q3_tirzepatide_prescribed
    text: >
      Have you prescribed tirzepatide (dual GIP/GLP-1) for any appropriate type 2 diabetes
      patients since it became available (context: mid-2022)?
    options:
      - option_id: q3_yes
        label: Yes
      - option_id: q3_no_not_yet
        label: Not yet, but planning to evaluate
      - option_id: q3_no_unlikely
        label: No, unlikely in the near term
      - option_id: q3_unsure
        label: Unsure / not applicable to my panel

  - question_id: q4_tirzepatide_adoption_speed
    text: >
      If you use or plan to use tirzepatide, how would you describe your typical adoption speed
      for that agent relative to other new diabetes therapies?
    options:
      - option_id: q4_early
        label: Early — among the first in my practice to try when evidence and access align
      - option_id: q4_mainstream
        label: Mainstream — adopt once guidelines/payers/peers catch up
      - option_id: q4_late
        label: Late / cautious — wait for longer track record or broader access
      - option_id: q4_na
        label: Not applicable (not prescribing tirzepatide)

  - question_id: q5_branded_vs_generic
    text: >
      For oral diabetes agents where a generic exists, what is your usual default when
      clinically equivalent options exist?
    options:
      - option_id: q5_prefer_branded
        label: Prefer branded when payer allows
      - option_id: q5_prefer_generic
        label: Prefer generic when available
      - option_id: q5_no_pref
        label: No strong preference — patient cost and formulary decide
      - option_id: q5_case_by_case
        label: Entirely case-by-case

  - question_id: q6_diabetes_drug_count
    text: >
      Roughly how many distinct diabetes-relevant medication names (classes/agents) do you
      prescribe regularly across your panel?
    options:
      - option_id: q6_1_5
        label: 1–5
      - option_id: q6_6_10
        label: 6–10
      - option_id: q6_11_20
        label: 11–20
      - option_id: q6_20p
        label: More than 20
