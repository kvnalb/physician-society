# Maps each survey item to cohort fields. Persona (production) uses **≤2022** Part D + OP only.
# Pseudo-labels for eval use **post-2022 / 2023** fields — must stay out of the production prompt.
# See eval/behavioral_labels.py (RULES_VERSION).
version: 2
persona_production_fields:
  - specialty
  - city
  - state
  - organization_name
  - credentials
  - adoption_archetype
  - pharma_engagement_tier
  - claims_2022
  - beneficiaries_2022
  - diabetes_share_2022
  - glp1_penetration_2022
  - branded_share_2022
  - drug_diversity_2022
  - total_payments_2022
  - novo_nordisk_payments
  - eli_lilly_payments
  - geo_cluster
items:
  f_q1_tirzepatide_12m:
    prompt_context_fields:
      - glp1_penetration_2022
      - adoption_archetype
    eval_pseudo_label:
      fields: [has_tirzepatide_2023, tirzepatide_claims_2023]
      module: eval.behavioral_labels
    notes: Forward intent vs realized 2023 tirzepatide uptake (not in prompt).

  f_q2_glp1_trajectory:
    prompt_context_fields:
      - glp1_penetration_2022
    eval_pseudo_label:
      fields: [glp1_penetration_2022, glp1_penetration_2023]
      module: eval.behavioral_labels

  f_q3_branded_trajectory:
    prompt_context_fields:
      - branded_share_2022
    eval_pseudo_label:
      fields: [branded_share_2022, branded_share_2023]
      module: eval.behavioral_labels

  f_q4_diabetes_mix_trajectory:
    prompt_context_fields:
      - diabetes_share_2022
    eval_pseudo_label:
      fields: [diabetes_share_2022, diabetes_share_2023]
      module: eval.behavioral_labels

  f_q5_panel_scale_trajectory:
    prompt_context_fields:
      - claims_2022
    eval_pseudo_label:
      fields: [claims_2022, claims_2023]
      module: eval.behavioral_labels

  f_q6_molecule_breadth_trajectory:
    prompt_context_fields:
      - drug_diversity_2022
    eval_pseudo_label:
      fields: [drug_diversity_2022, drug_diversity_2023]
      module: eval.behavioral_labels
